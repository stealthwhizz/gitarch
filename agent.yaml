spec_version: "0.1.0"
name: git-archaeologist
version: 1.0.0
description: Answers why your codebase is the way it is, using git history

model:
  # Runtime value: lyzr:<GITAGENT_LYZR_AGENT_ID>@https://agent-prod.studio.lyzr.ai/v4
  # Built dynamically in index.js from LYZR_API_KEY + GITAGENT_LYZR_AGENT_ID env vars
  preferred: "lyzr:set-via-env@https://agent-prod.studio.lyzr.ai/v4"
  constraints:
    temperature: 0.3
    max_tokens: 8000

tools: [cli, read, write, memory]
skills: [archaeology]

runtime:
  max_turns: 30
  timeout: 180