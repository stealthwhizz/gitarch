name: git-query
description: Query git history with customizable filters and output formats
input_schema:
  type: object
  properties:
    command:
      type: string
      description: Git command to run (log, blame, show, diff, etc.)
    path:
      type: string
      description: File or directory path to query (optional)
    since:
      type: string
      description: Start date for history (ISO format or relative like '6 months ago')
    until:
      type: string
      description: End date for history (ISO format)
    author:
      type: string
      description: Filter commits by author email
    pattern:
      type: string
      description: Search pattern for grep-style queries
    format:
      type: string
      description: Output format (json, raw, summary)
      enum: [json, raw, summary]
      default: raw
  required:
    - command
implementation:
  script: scripts/git-query.sh
  runtime: sh
